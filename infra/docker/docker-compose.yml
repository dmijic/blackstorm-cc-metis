name: blackstorm-command-center

x-api-env-file: &api-env-file
  - path: ${REPO_ROOT:-.}/apps/api/.env
    required: false

x-web-env-file: &web-env-file
  - path: ${REPO_ROOT:-.}/apps/web/.env
    required: false

x-api-environment: &api-environment
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: "${APP_DEBUG:-false}"
  APP_URL: ${APP_URL:-https://blackstorm.dariomijic.com}
  APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://blackstorm.dariomijic.com}
  METIS_TOOLS_URL: ${METIS_TOOLS_URL:-http://go-tools:9090}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-blackstorm}
  DB_USERNAME: ${DB_USERNAME:-blackstorm}
  DB_PASSWORD: ${DB_PASSWORD:-blackstorm}
  REDIS_CLIENT: ${REDIS_CLIENT:-predis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  CACHE_STORE: ${CACHE_STORE:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailhog}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Blackstorm Command Center API}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-blackstorm.dariomijic.com}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://blackstorm.dariomijic.com}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blackstorm}
      POSTGRES_USER: ${DB_USERNAME:-blackstorm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blackstorm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blackstorm} -d ${DB_DATABASE:-blackstorm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped

  api:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "composer install --no-interaction --prefer-dist && php-fpm -F"
    healthcheck:
      test: ["CMD-SHELL", "cd /var/www/apps/api && php artisan --version > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 15s
      start_period: 180s
      retries: 5

  worker:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -c "php artisan queue:work redis --sleep=1 --tries=3 --timeout=120"

  scheduler:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -c "php artisan schedule:work"

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/apps/web
    env_file: *web-env-file
    environment:
      NODE_ENV: production
      CHOKIDAR_USEPOLLING: "false"
      VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-5173}:5173"
    command: sh -lc "npm ci --include=dev --no-audit --no-fund && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 180s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:80"
    volumes:
      - ${REPO_ROOT:-.}/apps/api:/var/www/apps/api
      - ${REPO_ROOT:-.}/infra/docker/proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 40s
      retries: 5

  go-tools:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/go-tools/Dockerfile
    restart: unless-stopped
    environment:
      TOOLS_PORT: "9090"
      GOD_MODE: "${METIS_GOD_MODE:-false}"
    volumes:
      - go_tools_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  go_tools_data:
