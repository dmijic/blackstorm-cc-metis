name: blackstorm-command-center

x-api-env-file: &api-env-file
  - ${REPO_ROOT:-.}/apps/api/.env

x-web-env-file: &web-env-file
  - ${REPO_ROOT:-.}/apps/web/.env

x-api-environment: &api-environment
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: "${APP_DEBUG:-true}"
  APP_URL: ${APP_URL:-http://127.0.0.1:8000}
  APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://127.0.0.1:5173}
  # Metis — go-tools sidecar endpoint (port 9090 internal)
  METIS_TOOLS_URL: ${METIS_TOOLS_URL:-http://go-tools:9090}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-blackstorm}
  DB_USERNAME: ${DB_USERNAME:-blackstorm}
  DB_PASSWORD: ${DB_PASSWORD:-blackstorm}
  REDIS_CLIENT: ${REDIS_CLIENT:-predis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  CACHE_STORE: ${CACHE_STORE:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailhog}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Blackstorm Command Center API}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:5173,127.0.0.1:5173,localhost:8000,127.0.0.1:8000}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blackstorm}
      POSTGRES_USER: ${DB_USERNAME:-blackstorm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blackstorm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blackstorm} -d ${DB_DATABASE:-blackstorm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_HOST_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_HOST_PORT:-8025}:8025"

  api:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # composer install runs once here; worker/scheduler share the same volume
    command: sh -c "composer install --no-interaction --prefer-dist && php-fpm -F"
    healthcheck:
      # php artisan --version succeeds only after composer install finishes
      # and the Laravel bootstrap is functional
      test: ["CMD-SHELL", "cd /var/www/apps/api && php artisan --version > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 15s
      start_period: 180s
      retries: 5

  worker:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        # Wait for api to finish composer install + php-fpm healthy
        condition: service_healthy
    command: sh -c "php artisan queue:work redis --sleep=1 --tries=3 --timeout=120"

  scheduler:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/apps/api
    env_file: *api-env-file
    environment: *api-environment
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -c "php artisan schedule:work"

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/apps/web
    env_file: *web-env-file
    environment:
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
    volumes:
      - ${REPO_ROOT:-.}:/var/www
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-5173}:5173"
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:80"
    volumes:
      - ${REPO_ROOT:-.}/apps/api:/var/www/apps/api
      - ${REPO_ROOT:-.}/infra/docker/proxy/default.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Metis: Go-based security tools sidecar ──────────────────────────────────
  # Provides HTTP API for subfinder, httpx, naabu.
  # Internal only — NOT exposed to host network on a public port.
  # All active-scan calls are proxied through Laravel API which enforces scope verification.
  go-tools:
    build:
      context: ${REPO_ROOT:-.}
      dockerfile: infra/docker/go-tools/Dockerfile
    restart: unless-stopped
    environment:
      TOOLS_PORT: "9090"
      GOD_MODE: "${METIS_GOD_MODE:-false}"
    volumes:
      - go_tools_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  go_tools_data:
