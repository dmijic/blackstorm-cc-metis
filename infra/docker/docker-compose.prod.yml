services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"

  mailhog:
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_HOST_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_HOST_PORT:-8025}:8025"

  api:
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://blackstorm.dariomijic.com}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://blackstorm.dariomijic.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-blackstorm.dariomijic.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://blackstorm.dariomijic.com}

  worker:
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://blackstorm.dariomijic.com}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://blackstorm.dariomijic.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-blackstorm.dariomijic.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://blackstorm.dariomijic.com}

  scheduler:
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://blackstorm.dariomijic.com}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://blackstorm.dariomijic.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-blackstorm.dariomijic.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://blackstorm.dariomijic.com}

  web:
    environment:
      NODE_ENV: production
      CHOKIDAR_USEPOLLING: "false"
      VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-5173}:5173"
    command: sh -lc "npm ci --no-audit --no-fund && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 180s
      retries: 5

  proxy:
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 40s
      retries: 5
